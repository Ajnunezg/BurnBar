name: OpenBurnBar
options:
  bundleIdPrefix: com.openburnbar
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "0.1.3-beta.1"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    INFOPLIST_KEY_LSUIElement: true
    GENERATE_INFOPLIST_FILE: YES

# macOS Debug: the OpenBurnBar target uses keychain-access-groups (Firebase Auth). Xcode must sign with a
# development identity. Under targets.OpenBurnBar.settings.base add:
#   DEVELOPMENT_TEAM: <your 10-character Team ID>
# (Xcode → Settings → Accounts → your Apple ID → Team ID; or developer.apple.com → Membership.)

packages:
  OpenBurnBarCore:
    path: OpenBurnBarCore
  # SQLCipher-enabled GRDB (SPM). Must stay aligned with OpenBurnBarDaemon/Package.swift.
  # Upstream: https://github.com/SahebRoy92/GRDB-SQLCipher (GRDB 6.29.3 + SQLCipher.swift)
  GRDB:
    url: https://github.com/SahebRoy92/GRDB-SQLCipher
    exactVersion: 6.29.3
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: "0.10.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.18.0"

targets:
  OpenBurnBar:
    type: application
    platform: macOS
    # CFBundleURLTypes does not reliably merge via INFOPLIST_KEY_* with GENERATE_INFOPLIST_FILE.
    # XcodeGen regenerates this plist on `xcodegen generate`, so keep it aligned with
    # AgentLens/Resources/OpenBurnBar-Info.plist.
    info:
      path: AgentLens/Resources/OpenBurnBar-Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.openburnbar.app
            CFBundleURLSchemes:
              - openburnbar
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.openburnbar.app.google-sign-in
            CFBundleURLSchemes:
              # IMPORTANT: Replace YOUR_CLIENT_ID_SUFFIX with your actual reversed Firebase client ID suffix.
              # Obtain from: GoogleService-Info.plist -> REVERSED_CLIENT_ID
              - com.googleusercontent.apps.YOUR_CLIENT_ID_SUFFIX
    sources:
      - path: AgentLens
        excludes:
          - "**/.DS_Store"
          # Local split drafts that duplicate still-compiled root files. Keep
          # them out of generated projects until their owning refactors land.
          - Services/ProjectionPipeline/ProjectionPipelineService*.swift
          - "**/Services/ProjectionPipeline/ProjectionPipelineService*.swift"
          - Services/Search/SearchService*.swift
          - "**/Services/Search/SearchService*.swift"
          # Local Chat UI shim that duplicates types still declared by the main
          # chat surface. Keep it out until the owning refactor lands.
          - Views/Chat/ChatEngineUIStubs.swift
          - "**/Views/Chat/ChatEngineUIStubs.swift"
    settings:
      base:
        PRODUCT_NAME: OpenBurnBar
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.app
        DEVELOPMENT_TEAM: 4Y367DF25B
        CODE_SIGN_ENTITLEMENTS: AgentLens/Resources/OpenBurnBar.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: OpenBurnBar
        INFOPLIST_KEY_CFBundleName: OpenBurnBar
        INFOPLIST_KEY_NSSupportsAutomaticTermination: NO
        INFOPLIST_KEY_NSSupportsSuddenTermination: NO
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
    postBuildScripts:
      - name: Configure Firebase Auth Resources
        # GoogleService-Info.plist is bundled via the regular Copy Resources phase
        # (it lives in AgentLens/Resources). This step only patches Info.plist's
        # CFBundleURLTypes with the REVERSED_CLIENT_ID extracted from the plist.
        script: |
          set -euo pipefail
          SOURCE_PLIST="${PROJECT_DIR}/AgentLens/Resources/GoogleService-Info.plist"
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"

          if [[ ! -f "${SOURCE_PLIST}" ]]; then
            echo "warning: GoogleService-Info.plist not found; Google, Apple, and email auth remain disabled."
            exit 0
          fi

          REVERSED_CLIENT_ID="$(
            /usr/libexec/PlistBuddy -c "Print :REVERSED_CLIENT_ID" "${SOURCE_PLIST}" 2>/dev/null || true
          )"
          if [[ -n "${REVERSED_CLIENT_ID}" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:1:CFBundleURLSchemes:0 ${REVERSED_CLIENT_ID}" "${INFO_PLIST}"
          fi
        inputFiles:
          - $(PROJECT_DIR)/AgentLens/Resources/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(INFOPLIST_PATH)
    dependencies:
      - target: OpenBurnBarDaemonExecutable
        link: false
        embed: false
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
      - package: OpenBurnBarCore
        product: OpenBurnBarIrohRelay
      - package: OpenBurnBarCore
        product: OpenBurnBarMedia
      - package: OpenBurnBarCore
        product: OpenBurnBarComputerUseCore
      - package: GRDB
        product: GRDB
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseRemoteConfig
      - package: Firebase
        product: FirebaseAppCheck
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Sentry
        product: Sentry
    scheme:
      testTargets:
        - OpenBurnBarTests
        - OpenBurnBarDaemonTests

  OpenBurnBarDaemon:
    type: library.static
    platform: macOS
    sources:
      - path: OpenBurnBarDaemon/Sources/OpenBurnBarDaemon
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarDaemon
    preBuildScripts:
      - name: Dedupe GRDB Link File Entries (Xcode 16)
        script: |
          # Xcode 16.4 can pass GRDB.o twice to libtool for this static target:
          # once via LinkFileList and once as an explicit linker argument.
          # Keep GRDB in the explicit arg path on 16.x by removing it from all
          # per-arch LinkFileLists only for 16.x toolchains.
          if [[ -n "${XCODE_VERSION_MAJOR:-}" && "${XCODE_VERSION_MAJOR}" -lt 1700 ]]; then
            for candidate in \
              "${LINK_FILE_LIST_normal_arm64:-}" \
              "${LINK_FILE_LIST_normal_x86_64:-}" \
              "${OBJECT_FILE_DIR_normal}/arm64/${PRODUCT_NAME}.LinkFileList" \
              "${OBJECT_FILE_DIR_normal}/x86_64/${PRODUCT_NAME}.LinkFileList" \
              "${OBJECT_FILE_DIR_normal}/${CURRENT_ARCH}/${PRODUCT_NAME}.LinkFileList" \
              "${OBJECT_FILE_DIR_normal}/${PRODUCT_NAME}.LinkFileList"
            do
              if [[ -n "${candidate}" && -f "${candidate}" ]]; then
                tmp_file="${candidate}.tmp"
                # Drop GRDB.o from each link file (it is added explicitly by Xcode)
                # and collapse any accidental duplicate object entries.
                awk '!/\/GRDB\.o$/ && !seen[$0]++' "${candidate}" > "${tmp_file}" || true
                mv "${tmp_file}" "${candidate}"
              fi
            done
          fi
    dependencies:
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
        link: false
      - package: OpenBurnBarCore
        product: OpenBurnBarComputerUseCore
        link: false
      - package: GRDB
        product: GRDB
      - sdk: UserNotifications.framework

  OpenBurnBarDaemonExecutable:
    type: tool
    platform: macOS
    sources:
      - path: OpenBurnBarDaemon/Sources/OpenBurnBarDaemonExecutable/OpenBurnBarDaemonMain.swift
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarDaemon
        PRODUCT_MODULE_NAME: OpenBurnBarDaemonExecutable
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.daemon
    dependencies:
      - target: OpenBurnBarDaemon
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
      - package: OpenBurnBarCore
        product: OpenBurnBarComputerUseCore

  OpenBurnBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgentLensTests/Active
        excludes:
          - "**/*.swift.plist"

      - path: AgentLensTests/Support
        excludes:
          - "**/*.swift.plist"
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarTests
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.tests
        BUNDLE_LOADER: "$(BUILT_PRODUCTS_DIR)/OpenBurnBar.app/Contents/MacOS/OpenBurnBar"
        TEST_HOST: "$(BUNDLE_LOADER)"
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
    dependencies:
      - target: OpenBurnBar
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
        link: false
      - package: OpenBurnBarCore
        product: OpenBurnBarMedia
        link: false
      - package: OpenBurnBarCore
        product: OpenBurnBarComputerUseCore
        link: false
      - package: ViewInspector
        product: ViewInspector
      - package: SnapshotTesting
        product: SnapshotTesting

  OpenBurnBarDaemonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenBurnBarDaemon/Tests/OpenBurnBarDaemonTests
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarDaemonTests
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.daemon.tests
    dependencies:
      - target: OpenBurnBarDaemon
      - target: OpenBurnBarDaemonExecutable
        link: false
        embed: false
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
      - package: OpenBurnBarCore
        product: OpenBurnBarComputerUseCore

  OpenBurnBarMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenBurnBarMobile
        excludes:
          - "**/.DS_Store"
          - "Tests/**"
          - "Resources/Mermaid/**"
      # Mermaid is shipped as a folder reference so `index.html` and
      # `mermaid.min.js` keep their relative paths inside the bundle.
      - path: OpenBurnBarMobile/Resources/Mermaid
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarMobile
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 20
        DEVELOPMENT_TEAM: 4Y367DF25B
        CODE_SIGN_STYLE: Automatic
        # Apple sign-in + iOS Keychain access group; see
        # OpenBurnBarMobile/Resources/OpenBurnBarMobile.entitlements.
        CODE_SIGN_ENTITLEMENTS: OpenBurnBarMobile/Resources/OpenBurnBarMobile.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: OpenBurnBar
        INFOPLIST_KEY_CFBundleName: OpenBurnBar
        INFOPLIST_KEY_NSCameraUsageDescription: OpenBurnBar uses the camera only when you choose Take Photo to attach an image to a Hermes chat or start a trusted Mercury video call.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: OpenBurnBar uses the microphone only when you start voice commands or a trusted Mercury audio call.
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: OpenBurnBar uses speech recognition only while you hold the voice command control to turn your spoken command into text.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: OpenBurnBar accesses selected photo library items only when you choose Photo Library to attach media to a Hermes chat.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: OpenBurnBar saves received media to your photo library only when you choose Save.
        INFOPLIST_KEY_NSMotionUsageDescription: OpenBurnBar reads device motion only to adapt the mobile dashboard while you are using the app.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: OpenBurnBar uses the local network to connect this iPhone or iPad to your trusted Mac for pairing, Hermes relay, and media sessions.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_OpenBurnBarUseDebugAppCheck: "$(OPENBURNBAR_USE_DEBUG_APP_CHECK)"
        OPENBURNBAR_USE_DEBUG_APP_CHECK: "NO"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    postBuildScripts:
      - name: Inject Internal App Check Debug Token
        script: |
          set -euo pipefail

          STAMP="${SCRIPT_OUTPUT_FILE_0:-}"
          finish() {
            if [[ -n "${STAMP}" ]]; then
              mkdir -p "$(dirname "${STAMP}")"
              touch "${STAMP}"
            fi
          }
          trap finish EXIT

          if [[ "${OPENBURNBAR_USE_DEBUG_APP_CHECK:-}" != "YES" ]]; then
            exit 0
          fi

          if [[ -z "${FIREBASE_APP_CHECK_DEBUG_TOKEN:-}" ]]; then
            echo "error: FIREBASE_APP_CHECK_DEBUG_TOKEN is required when OPENBURNBAR_USE_DEBUG_APP_CHECK=YES."
            exit 1
          fi

          BUILT_PLIST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GoogleService-Info.plist"
          if [[ ! -f "${BUILT_PLIST}" ]]; then
            echo "error: Built GoogleService-Info.plist not found at ${BUILT_PLIST}."
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Delete :FirebaseAppCheckDebugToken" "${BUILT_PLIST}" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :FirebaseAppCheckDebugToken string ${FIREBASE_APP_CHECK_DEBUG_TOKEN}" "${BUILT_PLIST}"
          /usr/libexec/PlistBuddy -c "Delete :FIRAAppCheckDebugToken" "${BUILT_PLIST}" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :FIRAAppCheckDebugToken string ${FIREBASE_APP_CHECK_DEBUG_TOKEN}" "${BUILT_PLIST}"
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
        outputFiles:
          - $(DERIVED_FILE_DIR)/InjectInternalAppCheckDebugToken.stamp
      - name: Block App Check Debug Token In Release
        script: |
          set -euo pipefail

          STAMP="${SCRIPT_OUTPUT_FILE_0:-}"
          finish() {
            if [[ -n "${STAMP}" ]]; then
              mkdir -p "$(dirname "${STAMP}")"
              touch "${STAMP}"
            fi
          }
          trap finish EXIT

          if [[ "${CONFIGURATION:-}" == "Debug" ]] || [[ "${OPENBURNBAR_USE_DEBUG_APP_CHECK:-}" == "YES" ]]; then
            exit 0
          fi

          SOURCE_PLIST="${PROJECT_DIR}/OpenBurnBarMobile/Resources/GoogleService-Info.plist"
          if [[ ! -f "${SOURCE_PLIST}" ]]; then
            exit 0
          fi

          for KEY in FirebaseAppCheckDebugToken FIRAAppCheckDebugToken; do
            if /usr/libexec/PlistBuddy -c "Print :${KEY}" "${SOURCE_PLIST}" >/dev/null 2>&1; then
              echo "error: ${KEY} must not be present in OpenBurnBarMobile/Resources/GoogleService-Info.plist for non-Debug builds."
              exit 1
            fi
          done
        inputFiles:
          - $(PROJECT_DIR)/OpenBurnBarMobile/Resources/GoogleService-Info.plist
        outputFiles:
          - $(DERIVED_FILE_DIR)/BlockAppCheckDebugTokenInRelease.stamp
    info:
      path: OpenBurnBarMobile/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: OpenBurnBar uses the camera only when you choose Take Photo to attach an image to a Hermes chat or start a trusted Mercury video call.
        NSMicrophoneUsageDescription: OpenBurnBar uses the microphone only when you start voice commands or a trusted Mercury audio call.
        NSSpeechRecognitionUsageDescription: OpenBurnBar uses speech recognition only while you hold the voice command control to turn your spoken command into text.
        NSPhotoLibraryUsageDescription: OpenBurnBar accesses selected photo library items only when you choose Photo Library to attach media to a Hermes chat.
        NSPhotoLibraryAddUsageDescription: OpenBurnBar saves received media to your photo library only when you choose Save.
        NSMotionUsageDescription: OpenBurnBar reads device motion only to adapt the mobile dashboard while you are using the app.
        NSLocalNetworkUsageDescription: OpenBurnBar uses the local network to connect this iPhone or iPad to your trusted Mac for pairing, Hermes relay, and media sessions.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.openburnbar.app.google-sign-in
            CFBundleURLSchemes:
              # MUST match REVERSED_CLIENT_ID in OpenBurnBarMobile/Resources/GoogleService-Info.plist.
              # Mismatch crashes the app at GIDSignIn.signIn(withPresenting:) with an Objective-C
              # exception about missing URL schemes that Swift cannot catch.
              - com.googleusercontent.apps.246956661961-h48alif674cr67ojj4li9og8gbcjinbv
    dependencies:
      - target: OpenBurnBarWidget
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
      - package: OpenBurnBarCore
        product: OpenBurnBarIrohRelay
      - package: OpenBurnBarCore
        product: OpenBurnBarMedia
      - package: OpenBurnBarCore
        product: OpenBurnBarComputerUseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseRemoteConfig
      - package: Firebase
        product: FirebaseAppCheck
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Sentry
        product: Sentry
    scheme:
      testTargets:
        - OpenBurnBarMobileTests
        - OpenBurnBarMobileUITests
      storeKitConfiguration: OpenBurnBarMobileTests/Resources/OpenBurnBarHostedQuota.storekit

  OpenBurnBarMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenBurnBarMobileTests
        excludes:
          - "**/.DS_Store"
      - path: OpenBurnBarMobile/Tests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarMobileTests
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.app.tests
        DEVELOPMENT_TEAM: 4Y367DF25B
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: OpenBurnBarMobile
      - package: OpenBurnBarCore
        product: OpenBurnBarCore

  OpenBurnBarMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenBurnBarMobileUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarMobileUITests
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.app.uitests
        DEVELOPMENT_TEAM: 4Y367DF25B
        CODE_SIGN_STYLE: Automatic
        TEST_TARGET_NAME: OpenBurnBarMobile
    dependencies:
      - target: OpenBurnBarMobile

  OpenBurnBarWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OpenBurnBarWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: OpenBurnBarWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.openburnbar.app.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 20
        DEVELOPMENT_TEAM: 4Y367DF25B
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: OpenBurnBarWidget/Resources/OpenBurnBarWidget.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: OpenBurnBar Widget
        INFOPLIST_KEY_CFBundleName: BurnBarWidget
        SKIP_INSTALL: true
    info:
      path: OpenBurnBarWidget/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
          
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WidgetKit.framework
      - package: OpenBurnBarCore
        product: OpenBurnBarCore
