name: OpenBurnBar Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

env:
  SCHEME: OpenBurnBar
  PROJECT: OpenBurnBar.xcodeproj
  CONFIG: Release
  DESTINATION: "platform=macOS"
  CACHE_DIR: .spm-cache
  DERIVED_DATA: .derived-data

jobs:
  build-and-release:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/openburnbar/package-lock.json

      - name: Install extension dependencies
        run: npm ci --prefix extensions/openburnbar

      - name: Run Swift tests
        run: ./scripts/test-openburnbar-swift.sh

      - name: Run OpenBurnBar app tests
        run: ./scripts/test-openburnbar-app.sh

      - name: Run TypeScript tests
        run: ./scripts/test-openburnbar-ts.sh

      - name: Build extension
        run: npm run --prefix extensions/openburnbar build

      - name: Build daemon (SPM release binary)
        run: swift build --package-path OpenBurnBarDaemon -c release

      - name: Extract version from tag
        id: version
        run: |
          # Validate tag format: must be v followed by semver-like characters only
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "$TAG_NAME" =~ ^v[0-9a-zA-Z._-]+$ ]]; then
            echo "::error::Invalid tag format: $TAG_NAME"
            exit 1
          fi
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate Apple release secrets
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          require_all_or_none() {
            local label="$1"
            shift

            local present=0
            local missing=()

            for var in "$@"; do
              if [[ -n "${!var}" ]]; then
                present=1
              else
                missing+=("$var")
              fi
            done

            if [[ $present -eq 1 && ${#missing[@]} -gt 0 ]]; then
              echo "::error::$label secrets are partially configured. Missing: ${missing[*]}"
              exit 1
            fi
          }

          require_all_or_none "Code signing" \
            APPLE_CERTIFICATE_P12 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID

          require_all_or_none "Notarization" \
            APPLE_NOTARIZATION_APPLE_ID \
            APPLE_NOTARIZATION_PASSWORD \
            APPLE_TEAM_ID

          if [[ -n "$APPLE_NOTARIZATION_APPLE_ID" && -z "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "::error::Notarization requires code signing secrets to be configured too."
            exit 1
          fi

      - name: Validate Firebase CI secrets
        env:
          FIREBASE_PLIST_BASE64: ${{ secrets.FIREBASE_PLIST_BASE64 }}
          FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
        run: |
          missing=()
          for var in FIREBASE_PLIST_BASE64 FIREBASE_APP_CHECK_DEBUG_TOKEN; do
            if [[ -z "${!var}" ]]; then
              missing+=("$var")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required Firebase CI secrets: ${missing[*]}"
            exit 1
          fi

      - name: Inject Firebase config
        env:
          FIREBASE_PLIST_BASE64: ${{ secrets.FIREBASE_PLIST_BASE64 }}
          FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
        run: bash ./scripts/ci/inject-firebase-config.sh

      # ── Code signing setup (before build — must exist when xcodebuild signs) ──
      - name: Import signing certificate
        if: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["RUNNER_TEMP"], "certificate.p12").write_bytes(
              base64.b64decode(os.environ["CERTIFICATE_P12"])
          )
          PY
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      # ── Build the .app ──────────────────────────────────────────────
      - name: Resolve Xcode packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$CACHE_DIR" \
            -derivedDataPath "$DERIVED_DATA"

      - name: Build Release .app
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            SIGN_ARGS=(CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES DEVELOPMENT_TEAM="$TEAM_ID")
          else
            SIGN_ARGS=(CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO)
          fi

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIG" \
            -destination "$DESTINATION" \
            -clonedSourcePackagesDirPath "$CACHE_DIR" \
            -derivedDataPath "$DERIVED_DATA" \
            "${SIGN_ARGS[@]}" \
            build

      # ── Embed daemon helper into .app bundle ────────────────────────
      - name: Embed daemon binary in app bundle
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          HELPERS_DIR="$APP_PATH/Contents/Helpers"
          mkdir -p "$HELPERS_DIR"

          # The SPM release binary from the earlier build step
          DAEMON_BIN="OpenBurnBarDaemon/.build/release/OpenBurnBarDaemon"
          DAEMON_CORE_DYLIB="OpenBurnBarDaemon/.build/release/libOpenBurnBarCore.dylib"
          if [ ! -f "$DAEMON_BIN" ]; then
            echo "::error::Daemon binary not found at $DAEMON_BIN"
            exit 1
          fi
          if [ ! -f "$DAEMON_CORE_DYLIB" ]; then
            echo "::error::Daemon support library not found at $DAEMON_CORE_DYLIB"
            exit 1
          fi

          cp "$DAEMON_BIN" "$HELPERS_DIR/OpenBurnBarDaemon"
          cp "$DAEMON_CORE_DYLIB" "$HELPERS_DIR/libOpenBurnBarCore.dylib"
          chmod +x "$HELPERS_DIR/OpenBurnBarDaemon"
          echo "Embedded daemon: $(ls -la "$HELPERS_DIR/OpenBurnBarDaemon")"
          echo "Embedded daemon support library: $(ls -la "$HELPERS_DIR/libOpenBurnBarCore.dylib")"

      - name: Embed OpenBurnBarCore framework in app bundle
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          CORE_FRAMEWORK_PATH="$DERIVED_DATA/Build/Products/$CONFIG/PackageFrameworks/OpenBurnBarCore.framework"

          if [ ! -d "$CORE_FRAMEWORK_PATH" ]; then
            echo "::error::OpenBurnBarCore framework not found at $CORE_FRAMEWORK_PATH"
            exit 1
          fi

          mkdir -p "$FRAMEWORKS_DIR"
          rm -rf "$FRAMEWORKS_DIR/OpenBurnBarCore.framework"
          cp -R "$CORE_FRAMEWORK_PATH" "$FRAMEWORKS_DIR/"
          echo "Embedded framework: $(ls -la "$FRAMEWORKS_DIR/OpenBurnBarCore.framework")"

      # ── Post-build code signing (optional) ──────────────────────────
      - name: Codesign .app bundle
        if: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          ENTITLEMENTS="AgentLens/Resources/OpenBurnBar.entitlements"

          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH/Contents/Frameworks/OpenBurnBarCore.framework"

          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH/Contents/Helpers/libOpenBurnBarCore.dylib"

          # Sign the embedded daemon helper first
          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH/Contents/Helpers/OpenBurnBarDaemon"

          # Sign the main app bundle with entitlements preserved
          codesign --force --deep --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --verbose "$APP_PATH"

      # ── Package DMG ─────────────────────────────────────────────────
      - name: Create DMG
        id: dmg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          DMG_NAME="OpenBurnBar-${VERSION}-macOS.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"

          # Create a DMG with Applications symlink for drag-to-install
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "OpenBurnBar" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Codesign DMG
        if: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
        run: |
          codesign --force --sign "$SIGNING_IDENTITY" "$DMG_PATH"

      # ── Notarize (optional — requires Apple notarization secrets) ───
      - name: Notarize DMG
        if: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "$DMG_PATH"

      # ── Also create a ZIP of the .app ───────────────────────────────
      - name: Create ZIP archive
        id: zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          ZIP_NAME="OpenBurnBar-${VERSION}-macOS.zip"
          ZIP_PATH="$RUNNER_TEMP/$ZIP_NAME"

          cd "$(dirname "$APP_PATH")"
          ditto -c -k --keepParent "$(basename "$APP_PATH")" "$ZIP_PATH"

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release with artifacts ────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
          DMG_NAME: ${{ steps.dmg.outputs.dmg_name }}
          ZIP_PATH: ${{ steps.zip.outputs.zip_path }}
        run: |
          gh release create "$TAG_NAME" \
            "$DMG_PATH" \
            "$ZIP_PATH" \
            --title "OpenBurnBar $VERSION" \
            --notes "$(cat <<'RELEASE_NOTES'
          ## Installation

          ### Direct download
          1. Download the `.dmg` below
          2. Open the DMG and drag OpenBurnBar to Applications
          3. Launch OpenBurnBar — look for it in your menu bar

          ### Build from source
          ```bash
          git clone https://github.com/Ajnunezg/BurnBar.git
          cd BurnBar
          make install
          ```
          RELEASE_NOTES
          )" \
            --draft

      - name: Clean up Firebase config
        if: always()
        run: bash ./scripts/ci/cleanup-firebase-config.sh
