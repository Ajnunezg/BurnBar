name: OpenBurnBar Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to release (for manual reruns)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SCHEME: OpenBurnBar
  PROJECT: OpenBurnBar.xcodeproj
  CONFIG: Release
  DESTINATION: "platform=macOS"
  CACHE_DIR: .spm-cache
  DERIVED_DATA: .derived-data

jobs:
  build-and-release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 60
    outputs:
      dmg_path: ${{ steps.dmg.outputs.dmg_path }}
      dmg_name: ${{ steps.dmg.outputs.dmg_name }}
      zip_path: ${{ steps.zip.outputs.zip_path }}
      zip_name: ${{ steps.zip.outputs.zip_name }}
      version: ${{ steps.version.outputs.version }}
    env:
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_PLIST_BASE64 != '' && secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN != '' }}
      HAS_SIGNING_SECRETS: ${{ secrets.APPLE_TEAM_ID != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
      HAS_NOTARY_SECRETS: ${{ secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_API_KEY_P8 != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and version
        id: version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${INPUT_TAG}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9a-zA-Z._-]+$ ]]; then
            echo "::error::Invalid tag format: $TAG_NAME"
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$TAG_NAME" >/dev/null; then
            echo "::error::Tag does not exist in repository: $TAG_NAME"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          git fetch --force --tags origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          git checkout --detach "$TAG_NAME"
          echo "Building release tag $TAG_NAME at $(git rev-parse HEAD)"

      - name: Release preflight summary
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Release tag: $TAG_NAME"
          echo "Version: $VERSION"
          echo "Strict notarized release mode: true"
          echo "Firebase secrets available: ${HAS_FIREBASE_SECRETS}"
          echo "Signing secrets available: ${HAS_SIGNING_SECRETS}"
          echo "Notary API secrets available: ${HAS_NOTARY_SECRETS}"

      - name: Validate strict release secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_API_KEY_P8: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
          FIREBASE_PLIST_BASE64: ${{ secrets.FIREBASE_PLIST_BASE64 }}
          FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
        run: |
          missing=()
          for var in \
            APPLE_TEAM_ID \
            APPLE_SIGNING_IDENTITY \
            APPLE_CERTIFICATE_P12 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_API_KEY_P8 \
            FIREBASE_PLIST_BASE64 \
            FIREBASE_APP_CHECK_DEBUG_TOKEN; do
            if [[ -z "${!var}" ]]; then
              missing+=("$var")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required release secrets: ${missing[*]}"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/openburnbar/package-lock.json

      - name: Inject Firebase config
        env:
          FIREBASE_PLIST_BASE64: ${{ secrets.FIREBASE_PLIST_BASE64 }}
          FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
        run: bash ./scripts/ci/inject-firebase-config.sh

      - name: Install extension dependencies
        run: npm ci --prefix extensions/openburnbar

      - name: Run Swift tests
        run: ./scripts/test-openburnbar-swift.sh

      - name: Run OpenBurnBar app tests
        run: ./scripts/test-openburnbar-app.sh

      - name: Run TypeScript tests
        run: ./scripts/test-openburnbar-ts.sh

      - name: Build extension
        run: npm run --prefix extensions/openburnbar build

      - name: Build daemon (SPM release binary)
        run: swift build --package-path OpenBurnBarDaemon -c release

      - name: Resolve Xcode packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -clonedSourcePackagesDirPath "$CACHE_DIR" \
            -derivedDataPath "$DERIVED_DATA"

      - name: Build Release .app (unsigned)
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIG" \
            -destination "$DESTINATION" \
            -clonedSourcePackagesDirPath "$CACHE_DIR" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Embed daemon binary in app bundle
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          HELPERS_DIR="$APP_PATH/Contents/Helpers"
          mkdir -p "$HELPERS_DIR"

          DAEMON_BIN="OpenBurnBarDaemon/.build/release/OpenBurnBarDaemon"
          DAEMON_CORE_DYLIB="OpenBurnBarDaemon/.build/release/libOpenBurnBarCore.dylib"
          if [[ ! -f "$DAEMON_BIN" ]]; then
            echo "::error::Daemon binary not found at $DAEMON_BIN"
            exit 1
          fi
          if [[ ! -f "$DAEMON_CORE_DYLIB" ]]; then
            echo "::error::Daemon support library not found at $DAEMON_CORE_DYLIB"
            exit 1
          fi

          cp "$DAEMON_BIN" "$HELPERS_DIR/OpenBurnBarDaemon"
          cp "$DAEMON_CORE_DYLIB" "$HELPERS_DIR/libOpenBurnBarCore.dylib"
          chmod +x "$HELPERS_DIR/OpenBurnBarDaemon"

      - name: Embed OpenBurnBarCore framework in app bundle
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          CORE_FRAMEWORK_PATH="$DERIVED_DATA/Build/Products/$CONFIG/PackageFrameworks/OpenBurnBarCore.framework"

          if [[ ! -d "$CORE_FRAMEWORK_PATH" ]]; then
            echo "::error::OpenBurnBarCore framework not found at $CORE_FRAMEWORK_PATH"
            exit 1
          fi

          mkdir -p "$FRAMEWORKS_DIR"
          rm -rf "$FRAMEWORKS_DIR/OpenBurnBarCore.framework"
          cp -R "$CORE_FRAMEWORK_PATH" "$FRAMEWORKS_DIR/"

      - name: Import Developer ID signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "keychain_password=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["RUNNER_TEMP"], "certificate.p12").write_bytes(
              base64.b64decode(os.environ["CERTIFICATE_P12"])
          )
          PY

          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Codesign app bundle (deterministic order)
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          FRAMEWORKS_DIR="$APP_PATH/Contents/Frameworks"
          HELPERS_DIR="$APP_PATH/Contents/Helpers"
          ENTITLEMENTS="AgentLens/Resources/OpenBurnBarRelease.entitlements"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "::error::App bundle not found at $APP_PATH"
            exit 1
          fi

          if [[ -d "$FRAMEWORKS_DIR" ]]; then
            while IFS= read -r -d '' item; do
              codesign --force --timestamp --options runtime --sign "$SIGNING_IDENTITY" "$item"
            done < <(find "$FRAMEWORKS_DIR" -mindepth 1 \( -name '*.framework' -o -name '*.dylib' -o -name '*.bundle' \) -print0 | sort -z)
          fi

          if [[ -f "$HELPERS_DIR/libOpenBurnBarCore.dylib" ]]; then
            codesign --force --timestamp --options runtime --sign "$SIGNING_IDENTITY" "$HELPERS_DIR/libOpenBurnBarCore.dylib"
          fi

          if [[ -f "$HELPERS_DIR/OpenBurnBarDaemon" ]]; then
            codesign --force --timestamp --options runtime --sign "$SIGNING_IDENTITY" "$HELPERS_DIR/OpenBurnBarDaemon"
          fi

          codesign --force --timestamp --deep --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute -vv "$APP_PATH" || true

      - name: Create DMG
        id: dmg
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          DMG_NAME="OpenBurnBar-${VERSION}-macOS.dmg"
          DMG_PATH="$RUNNER_TEMP/$DMG_NAME"

          STAGING="$RUNNER_TEMP/dmg-staging"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "OpenBurnBar" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Codesign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
        run: |
          codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Write notary API key
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_API_KEY_P8: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
        run: |
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_id = os.environ["APPLE_NOTARY_KEY_ID"]
          payload = os.environ["APPLE_NOTARY_API_KEY_P8"]
          Path(os.environ["RUNNER_TEMP"], f"AuthKey_{key_id}.p8").write_bytes(base64.b64decode(payload))
          PY
          chmod 600 "$NOTARY_KEY_PATH"
          echo "notary_key_path=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"

      - name: Notarize and staple DMG
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
        run: |
          NOTARY_ARGS=(
            --key "$notary_key_path"
            --key-id "$APPLE_NOTARY_KEY_ID"
          )

          # Avoid using `notarytool history` as an auth probe because it can
          # trap on some runner/toolchain combinations. Probe by submit itself.
          if [[ -n "${APPLE_NOTARY_ISSUER_ID:-}" ]]; then
            set +e
            xcrun notarytool submit "$DMG_PATH" "${NOTARY_ARGS[@]}" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait --timeout 30m
            notary_status=$?
            set -e
            if [[ $notary_status -eq 0 ]]; then
              echo "Notary auth mode: team API key"
            else
              echo "::warning::Issuer-mode notarization failed; retrying without issuer (individual key mode)."
              xcrun notarytool submit "$DMG_PATH" "${NOTARY_ARGS[@]}" --wait --timeout 30m
              echo "Notary auth mode: individual API key"
            fi
          else
            xcrun notarytool submit "$DMG_PATH" "${NOTARY_ARGS[@]}" --wait --timeout 30m
            echo "Notary auth mode: individual API key"
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Create ZIP archive
        id: zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIG/OpenBurnBar.app"
          ZIP_NAME="OpenBurnBar-${VERSION}-macOS.zip"
          ZIP_PATH="$RUNNER_TEMP/$ZIP_NAME"

          cd "$(dirname "$APP_PATH")"
          ditto -c -k --keepParent "$(basename "$APP_PATH")" "$ZIP_PATH"

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Compute artifact checksums
        id: checksums
        env:
          DMG_PATH: ${{ steps.dmg.outputs.dmg_path }}
          ZIP_PATH: ${{ steps.zip.outputs.zip_path }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CHECKSUMS_FILE="$RUNNER_TEMP/checksums-v${VERSION}.txt"

          # Group writes (SC2129) so we open the output file once.
          {
            echo "# OpenBurnBar v${VERSION} release checksums"
            echo "# Generated at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Commit: $(git rev-parse HEAD)"
            echo ""
            sha256sum "$DMG_PATH"
            sha512sum "$DMG_PATH"
            sha256sum "$ZIP_PATH"
            sha512sum "$ZIP_PATH"
          } > "$CHECKSUMS_FILE"

          cat "$CHECKSUMS_FILE"

          echo "checksums_path=$CHECKSUMS_FILE" >> "$GITHUB_OUTPUT"

      - name: Sign checksums (release provenance)
        id: sign-checksums
        env:
          CHECKSUMS_PATH: ${{ steps.checksums.outputs.checksums_path }}
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        if: env.RELEASE_SIGNING_KEY != ''
        run: |
          # Import the GPG signing key
          echo "$RELEASE_SIGNING_KEY" | base64 --decode | gpg --import --batch --passphrase ""

          # Create a detached signature for the checksums file
          gpg --batch --yes --detach-sign --armor \
            --local-user "OpenBurnBar Release" \
            "$CHECKSUMS_PATH"

          echo "sig_path=${CHECKSUMS_PATH}.asc" >> "$GITHUB_OUTPUT"
          echo "Checksums signed successfully."

      - name: Generate SBOM
        id: sbom
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SBOM_FILE="$RUNNER_TEMP/sbom-v${VERSION}.spdx.json"

          python3 scripts/generate-sbom.py \
            --version "$VERSION" \
            --repo-root "$GITHUB_WORKSPACE" \
            --output "$SBOM_FILE"

          echo "sbom_path=$SBOM_FILE" >> "$GITHUB_OUTPUT"

      - name: Write release metadata
        id: metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          METADATA_FILE="$RUNNER_TEMP/release-metadata.json"

          cat > "$METADATA_FILE" <<EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG_NAME}",
            "commit": "$(git rev-parse HEAD)",
            "build_timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runner_os": "macos-15"
          }
          EOF

          echo "metadata_path=$METADATA_FILE" >> "$GITHUB_OUTPUT"
          cat "$METADATA_FILE"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dmg.outputs.dmg_name }}
          path: ${{ steps.dmg.outputs.dmg_path }}
          if-no-files-found: error

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip_name }}
          path: ${{ steps.zip.outputs.zip_path }}
          if-no-files-found: error

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-v${{ steps.version.outputs.version }}
          path: ${{ steps.checksums.outputs.checksums_path }}
          if-no-files-found: error

      - name: Upload checksum signature artifact
        if: steps.sign-checksums.outputs.sig_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: checksums-v${{ steps.version.outputs.version }}-signature
          path: ${{ steps.sign-checksums.outputs.sig_path }}
          if-no-files-found: error

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-v${{ steps.version.outputs.version }}
          path: ${{ steps.sbom.outputs.sbom_path }}
          if-no-files-found: error

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-v${{ steps.version.outputs.version }}
          path: ${{ steps.metadata.outputs.metadata_path }}
          if-no-files-found: error

      - name: Clean up Firebase config
        if: always()
        run: bash ./scripts/ci/cleanup-firebase-config.sh

  smoke-test:
    needs: build-and-release
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-release.outputs.dmg_name }}
          path: ${{ runner.temp }}

      - name: Mount DMG
        env:
          DMG_PATH: ${{ runner.temp }}/${{ needs.build-and-release.outputs.dmg_name }}
        run: |
          test -f "$DMG_PATH"
          hdiutil attach "$DMG_PATH" \
            -mountpoint /Volumes/OpenBurnBar \
            -nobrowse

      - name: Verify app launches and daemon starts
        run: |
          # Start the app in the background
          open /Volumes/OpenBurnBar/OpenBurnBar.app
          sleep 8

          # Check the app process is running
          if ! pgrep -x OpenBurnBar > /dev/null 2>&1; then
            echo "::error::OpenBurnBar app failed to launch"
            hdiutil detach /Volumes/OpenBurnBar -force 2>/dev/null || true
            exit 1
          fi

          # Check the daemon Unix socket exists and is reachable
          DAEMON_SOCKET="$HOME/Library/Application Support/OpenBurnBar/openburnbar-daemon.sock"
          # shellcheck disable=SC2034 # i is the canonical loop counter even though unused.
          for _ in {1..10}; do
            if [[ -S "$DAEMON_SOCKET" ]]; then
              break
            fi
            sleep 2
          done

          if [[ ! -S "$DAEMON_SOCKET" ]]; then
            echo "::error::Daemon socket not found at $DAEMON_SOCKET after 20s"
            hdiutil detach /Volumes/OpenBurnBar -force 2>/dev/null || true
            exit 1
          fi

          LAUNCH_AGENT_PLIST="$HOME/Library/LaunchAgents/com.openburnbar.daemon.plist"
          if [[ ! -f "$LAUNCH_AGENT_PLIST" ]]; then
            echo "::error::Daemon LaunchAgent plist not found at $LAUNCH_AGENT_PLIST"
            hdiutil detach /Volumes/OpenBurnBar -force 2>/dev/null || true
            exit 1
          fi

          SOCKET_AUTH_TOKEN="$(
            /usr/libexec/PlistBuddy -c 'Print :EnvironmentVariables:OPENBURNBAR_DAEMON_SOCKET_AUTH_TOKEN' "$LAUNCH_AGENT_PLIST" 2>/dev/null || true
          )"
          if [[ -z "$SOCKET_AUTH_TOKEN" ]]; then
            echo "::error::Daemon socket auth token missing from LaunchAgent environment"
            hdiutil detach /Volumes/OpenBurnBar -force 2>/dev/null || true
            exit 1
          fi

          python3 - <<PY
          import json
          import socket
          import sys

          path = """$DAEMON_SOCKET"""
          token = """$SOCKET_AUTH_TOKEN"""
          client = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
          client.settimeout(5)
          client.connect(path)
          client.sendall(json.dumps({
              "id": "release-smoke-health",
              "method": "daemon.health",
              "authToken": token
          }).encode() + b"\n")
          response = client.recv(65536).decode().strip()
          client.close()
          if not response:
              sys.exit("OpenBurnBar daemon returned an empty health response")
          payload = json.loads(response)
          if payload.get("error"):
              sys.exit(f"OpenBurnBar daemon health smoke failed: {payload['error']}")
          if not payload.get("result", {}).get("ok"):
              sys.exit(f"OpenBurnBar daemon health smoke returned unhealthy payload: {payload}")
          print("Authenticated daemon health RPC passed")
          PY

          echo "Smoke test passed: app launched, daemon socket active, authenticated daemon RPC succeeded"

      - name: Eject DMG
        run: |
          hdiutil detach /Volumes/OpenBurnBar -force 2>/dev/null || true

  publish:
    needs: [build-and-release, smoke-test]
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}
          merge-multiple: true

      - name: Publish prerelease assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.build-and-release.outputs.version }}
          VERSION: ${{ needs.build-and-release.outputs.version }}
          DMG_PATH: ${{ runner.temp }}/${{ needs.build-and-release.outputs.dmg_name }}
          ZIP_PATH: ${{ runner.temp }}/${{ needs.build-and-release.outputs.zip_name }}
        run: |
          # Checksums, SBOM, and metadata are also downloaded via merge-multiple.
          # `find -print -quit` is shellcheck-clean (SC2012) and quoted to handle spaces (SC2086).
          CHECKSUMS_PATH=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "checksums-v${VERSION}*.txt" -print -quit 2>/dev/null)
          SBOM_PATH=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.spdx.json" -print -quit 2>/dev/null)
          METADATA_PATH=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "release-metadata.json" -print -quit 2>/dev/null)
          SIG_PATH=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.asc" -print -quit 2>/dev/null)

          ASSETS=("$DMG_PATH" "$ZIP_PATH")
          for asset in "${ASSETS[@]}"; do
            if [[ ! -f "$asset" ]]; then
              echo "::error::Release asset missing after artifact download: $asset"
              exit 1
            fi
          done
          [[ -n "$CHECKSUMS_PATH" && -f "$CHECKSUMS_PATH" ]] && ASSETS+=("$CHECKSUMS_PATH")
          [[ -n "$SBOM_PATH" && -f "$SBOM_PATH" ]] && ASSETS+=("$SBOM_PATH")
          [[ -n "$METADATA_PATH" && -f "$METADATA_PATH" ]] && ASSETS+=("$METADATA_PATH")
          [[ -n "$SIG_PATH" && -f "$SIG_PATH" ]] && ASSETS+=("$SIG_PATH")

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" "${ASSETS[@]}" --clobber
            gh release edit "v${VERSION}" --title "OpenBurnBar $VERSION" --prerelease --latest=false
          else
            gh release create "v${VERSION}" \
              "${ASSETS[@]}" \
              --title "OpenBurnBar $VERSION" \
              --prerelease \
              --notes-file CHANGELOG.md
          fi

      - name: Clean up Firebase config
        if: always()
        run: bash ./scripts/ci/cleanup-firebase-config.sh

      - name: Clean up signing and notary artifacts
        if: always()
        run: |
          if [[ -n "${keychain_path:-}" && -n "${keychain_password:-}" ]]; then
            security delete-keychain "$keychain_path" || true
          fi
          if [[ -n "${notary_key_path:-}" ]]; then
            rm -f "$notary_key_path"
          fi
          rm -f "$RUNNER_TEMP/certificate.p12"
