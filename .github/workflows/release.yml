name: BurnBar Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/burnbar/package-lock.json

      - name: Install extension dependencies
        run: npm ci --prefix extensions/burnbar

      - name: Run Swift tests
        run: ./scripts/test-burnbar-swift.sh

      - name: Run TypeScript tests
        run: ./scripts/test-burnbar-ts.sh

      - name: Build extension
        run: npm run --prefix extensions/burnbar build

      - name: Build daemon
        run: swift build --package-path BurnBarDaemon -c release

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "BurnBar ${{ steps.version.outputs.version }}" \
            --generate-notes \
            --draft
