name: CodeQL

# Daily CodeQL scan + on every push/PR. Covers:
#   - Swift (AgentLens, OpenBurnBarDaemon, OpenBurnBarCore) — security + correctness
#   - JavaScript/TypeScript (VS Code extension)
#   - Python (CI helpers, build scripts)
#
# Swift is built with xcodebuild before analysis to ensure full symbol resolution.
# To activate this workflow, switch the repo's code-scanning configuration from
# "Default setup" to "Advanced setup" in Settings → Code security → Code scanning.
#
# Copilot Autofix runs automatically on the resulting alerts when enabled in
# the same settings page; it proposes fix commits you can land via a single
# click on each alert. That is the supported "auto-fix daily" path on GitHub.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 09:17 UTC daily — slightly off the hour to dodge GitHub's cron contention.
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Swift requires xcodebuild → macOS runner. JS/TS and Python don't need
    # macOS, but the matrix-level runner is set per-job to keep the matrix
    # simple. Per-language overrides handled below via `runs-on: ${{ matrix.runner }}`.
    runs-on: ${{ matrix.runner }}
    # Swift CodeQL can spend nearly the full previous 60-minute cap importing
    # TRAP files after a successful traced build on hosted macOS runners.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Swift coverage: the app, daemon, and core frameworks.
          # autobuild is sufficient for security queries; we use manual xcodebuild
          # for more complete symbol resolution.
          - language: swift
            build-mode: manual
            runner: macos-26
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: python
            build-mode: none
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # init must run BEFORE the manual Swift build so CodeQL's tracer
      # observes the compiler invocations. Without this, the database
      # finalizer reports "no source seen" and fails with exit 32.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-extended = strong security coverage without the
          # quality/lint noise that security-and-quality adds (unused-var,
          # dead-store, etc.). Those are handled by eslint in the PR harness.
          queries: security-extended

      # The app target references this plist as a bundle resource, but the real
      # Firebase config is intentionally gitignored. CodeQL only needs the Swift
      # build graph, so use the checked-in placeholder rather than requiring
      # production Firebase secrets for source analysis.
      - name: Prepare Firebase plist for Swift build
        if: matrix.language == 'swift'
        run: cp AgentLens/Resources/GoogleService-Info.plist.example AgentLens/Resources/GoogleService-Info.plist

      # Binary SwiftPM targets, especially Sentry's XCFramework artifacts, can
      # timeout on a cold macOS runner. Resolve packages with a bounded retry
      # before the traced build so transient CDN failures do not mask real
      # CodeQL/security signal.
      - name: Resolve Swift packages (CodeQL)
        if: matrix.language == 'swift'
        run: |
          for attempt in 1 2 3; do
            if xcodebuild -project OpenBurnBar.xcodeproj \
              -scheme OpenBurnBar \
              -configuration Debug \
              -derivedDataPath .codeql-derived-data \
              -resolvePackageDependencies; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done

      # Swift build — resolves packages and compiles all targets so CodeQL
      # can trace the compiler. Runs after init (so CodeQL hooks the build)
      # and only on the swift matrix entry. Disable code signing because
      # macOS-15 GitHub runners don't have signing identities.
      - name: Build Swift (CodeQL)
        if: matrix.language == 'swift'
        run: |
          xcodebuild -project OpenBurnBar.xcodeproj \
            -scheme OpenBurnBar \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath .codeql-derived-data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
