name: OpenBurnBar PR Harness

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  openburnbar-pr:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      INTERNAL_RUN: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_PLIST_BASE64 != '' && secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/openburnbar/package-lock.json

      - name: Inject Firebase config
        if: env.INTERNAL_RUN == 'true' && env.HAS_FIREBASE_SECRETS == 'true'
        env:
          FIREBASE_PLIST_BASE64: ${{ secrets.FIREBASE_PLIST_BASE64 }}
          FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
        run: bash ./scripts/ci/inject-firebase-config.sh

      - name: Skip Firebase config injection for fork PRs
        if: env.INTERNAL_RUN != 'true'
        run: echo "Skipping Firebase config injection for fork PR; auth remains disabled in CI."

      - name: Skip Firebase config injection when secrets are unavailable
        if: env.INTERNAL_RUN == 'true' && env.HAS_FIREBASE_SECRETS != 'true'
        run: echo "Firebase CI secrets are unavailable; running tests without injected auth config."

      - name: Install OpenBurnBar extension dependencies
        run: npm ci --prefix extensions/openburnbar

      - name: Run OpenBurnBar Swift tests
        run: ./scripts/test-openburnbar-swift.sh

      - name: Run OpenBurnBar app tests
        run: ./scripts/test-openburnbar-app.sh

      - name: Verify OpenBurnBar app SwiftPM lockfile
        run: ./scripts/check-openburnbar-app-swiftpm-lock.sh

      - name: Run OpenBurnBar retrieval replay evals
        run: ./scripts/test-openburnbar-retrieval-evals.sh

      - name: Run OpenBurnBar TypeScript unit tests
        run: ./scripts/test-openburnbar-ts.sh

      - name: Run OpenBurnBar replay evals
        run: ./scripts/test-openburnbar-replay-evals.sh

      - name: Run OpenBurnBar extension-host tests
        run: ./scripts/test-openburnbar-extension-host.sh

      - name: Summarize test counts
        if: always()
        run: |
          {
            echo "### Test Summary"
            echo ""
            echo "| Surface | Status |"
            echo "|---------|--------|"
            for step in "Swift tests" "App tests" "SwiftPM lockfile" "Retrieval evals" "TypeScript tests" "Replay evals" "Extension-host tests"; do
              echo "| $step | ran |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up Firebase config
        if: always() && env.INTERNAL_RUN == 'true' && env.HAS_FIREBASE_SECRETS == 'true'
        run: bash ./scripts/ci/cleanup-firebase-config.sh
