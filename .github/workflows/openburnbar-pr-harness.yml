name: OpenBurnBar PR Harness

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  openburnbar-pr:
    # Use the current GA macOS/Xcode image for the app target. The macOS 15
    # image's Xcode 16.4 Swift frontend crashes while lowering lazy global
    # initializers in the large OpenBurnBar SwiftUI target, before tests run.
    runs-on: macos-26
    timeout-minutes: 30
    env:
      INTERNAL_RUN: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
      HAS_FIREBASE_SECRETS: ${{ secrets.FIREBASE_PLIST_BASE64 != '' && secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate shell script syntax
        run: |
          set -euo pipefail
          for script in scripts/*.sh; do
            if ! bash -n "$script"; then
              echo "Shell syntax error in $script" >&2
              exit 1
            fi
          done
          echo "All shell scripts pass syntax validation."

      - name: Verify version consistency
        run: ./scripts/verify-version-consistency.sh

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extensions/openburnbar/package-lock.json

      - name: Inject Firebase config
        if: env.INTERNAL_RUN == 'true' && env.HAS_FIREBASE_SECRETS == 'true'
        env:
          FIREBASE_PLIST_BASE64: ${{ secrets.FIREBASE_PLIST_BASE64 }}
          FIREBASE_APP_CHECK_DEBUG_TOKEN: ${{ secrets.FIREBASE_APP_CHECK_DEBUG_TOKEN }}
        run: bash ./scripts/ci/inject-firebase-config.sh

      - name: Skip Firebase config injection for fork PRs
        if: env.INTERNAL_RUN != 'true'
        run: echo "Skipping Firebase config injection for fork PR; auth remains disabled in CI."

      - name: Skip Firebase config injection when secrets are unavailable
        if: env.INTERNAL_RUN == 'true' && env.HAS_FIREBASE_SECRETS != 'true'
        run: echo "Firebase CI secrets are unavailable; running tests without injected auth config."

      - name: Install OpenBurnBar extension dependencies
        run: npm ci --prefix extensions/openburnbar

      - name: Install OpenBurnBar Functions dependencies
        run: npm ci --prefix functions

      - name: Lint OpenBurnBar Functions
        run: npm --prefix functions run lint

      - name: Build OpenBurnBar Functions
        run: npm --prefix functions run build

      - name: Run OpenBurnBar Functions tests
        run: npm --prefix functions test

      - name: Run OpenBurnBar Swift tests
        run: OPENBURNBAR_ENABLE_COVERAGE=YES ./scripts/test-openburnbar-swift.sh

      - name: Run OpenBurnBar app tests
        # Xcode 16.4 can crash in SwiftEmitModule while lowering lazy global
        # initializers for this large SwiftUI app target. The script keeps this
        # as a real test gate while disabling the brittle batch compile path.
        run: ./scripts/test-openburnbar-app.sh

      - name: Verify OpenBurnBar app SwiftPM lockfile
        run: ./scripts/check-openburnbar-app-swiftpm-lock.sh

      - name: Extract code coverage
        if: always() && hashFiles('.derived-data/OpenBurnBar_TestCoverage.xcresult/**') != ''
        run: ./scripts/extract-coverage.sh "$GITHUB_WORKSPACE/.derived-data/OpenBurnBar_TestCoverage.xcresult" > "$GITHUB_WORKSPACE/openburnbar-coverage.json"

      - name: Compute diff coverage
        if: github.event_name == 'pull_request' && hashFiles('openburnbar-coverage.json') != ''
        run: ./scripts/diff-coverage.sh origin/main "$GITHUB_WORKSPACE/openburnbar-coverage.json" > "$GITHUB_WORKSPACE/openburnbar-diff-coverage.json"

      - name: Post coverage summary
        if: always()
        run: |
          {
            echo "### Code Coverage"
            echo ""
            if [ -f "$GITHUB_WORKSPACE/openburnbar-coverage.json" ]; then
              total_pct=$(jq -r '.summary.percent // 0' "$GITHUB_WORKSPACE/openburnbar-coverage.json")
              total_exc=$(jq -r '.summary.executableLines // 0' "$GITHUB_WORKSPACE/openburnbar-coverage.json")
              total_hit=$(jq -r '.summary.coveredLines // 0' "$GITHUB_WORKSPACE/openburnbar-coverage.json")
              echo "Overall coverage: **${total_pct}%** (${total_hit}/${total_exc} lines)"
              echo ""
            fi
            diff_cov="$GITHUB_WORKSPACE/openburnbar-diff-coverage.json"
            if [ -f "$diff_cov" ]; then
              threshold=$(jq -r '.diffCoverage.threshold // 80' "$diff_cov")
              percent=$(jq -r '.diffCoverage.percent // 0.0' "$diff_cov")
              passed=$(jq -r '.diffCoverage.passed // false' "$diff_cov")
              files=$(jq -r '.diffCoverage.changedFiles // 0' "$diff_cov")
              lines=$(jq -r '.diffCoverage.changedLines // 0' "$diff_cov")
              echo "Diff coverage: **${percent}%** (threshold: ${threshold}%)"
              echo "Changed files: ${files} | Changed executable lines: ${lines}"
              if [ "$passed" = "true" ]; then
                echo "Status: passed"
              else
                echo "Status: failed — new code coverage below threshold"
              fi
              echo ""
              echo "| File | Executable | Covered | % |"
              echo "|------|-----------|---------|---|"
              jq -r '.details[] | "| \(.file) | \(.executableLines) | \(.coveredLines) | \(.percent) |"' "$diff_cov" | head -50
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: |
            openburnbar-coverage.json
            openburnbar-diff-coverage.json

      - name: Run OpenBurnBar retrieval replay evals
        run: ./scripts/test-openburnbar-retrieval-evals.sh

      - name: Run OpenBurnBar TypeScript unit tests
        run: ./scripts/test-openburnbar-ts.sh

      - name: Run OpenBurnBar replay evals
        run: ./scripts/test-openburnbar-replay-evals.sh

      - name: Run OpenBurnBar extension-host tests
        run: ./scripts/test-openburnbar-extension-host.sh

      - name: Run Firestore rules emulator tests
        run: npm --prefix functions run test:firestore-rules

      # CodeQL analysis is enforced by the separate .github/workflows/codeql.yml
      # workflow which runs security-extended scans for Swift, JavaScript/TypeScript,
      # and Python on every push and PR. Cross-workflow status gates require branch
      # protection rules (Settings → Branches → Add rule → Require status checks).
      - name: Verify CodeQL workflow reference
        run: |
          echo "CodeQL security analysis is tracked by .github/workflows/codeql.yml"
          echo "Languages: Swift, JavaScript/TypeScript, Python"
          echo "Queries: security-extended"
          if [ -f .github/workflows/codeql.yml ]; then
            echo "Status: CodeQL workflow file present"
          else
            echo "Status: CodeQL workflow file MISSING"
            exit 1
          fi

      - name: Summarize test counts
        if: always()
        run: |
          {
            echo "### Test Summary"
            echo ""
            echo "| Surface | Status |"
            echo "|---------|--------|"
            for step in "Shell syntax" "Version consistency" "Functions lint" "Functions build" "Swift tests" "App tests" "SwiftPM lockfile" "Retrieval evals" "TypeScript tests" "Replay evals" "Extension-host tests" "Firestore rules" "CodeQL"; do
              echo "| $step | ran |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up Firebase config
        if: always() && env.INTERNAL_RUN == 'true' && env.HAS_FIREBASE_SECRETS == 'true'
        run: bash ./scripts/ci/cleanup-firebase-config.sh
