disabled_rules:
  - trailing_whitespace
  # SOTA: nest type_level relaxed for existing code; new code should prefer 1
  - nesting

opt_in_rules:
  # Original rules
  - empty_count
  - explicit_init
  - closure_spacing
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - sorted_first_last
  - redundant_type_annotation
  - override_in_extension
  - multiline_parameters
  - unneeded_parentheses_in_closure_argument
  - protocol_property_accessors_order
  - sorted_imports
  - is_disjoint
  - dynamic_inline
  # SOTA additions — safety
  - force_unwrapping
  - implicitly_unwrapped_optional
  - discouraged_optional_boolean
  - discouraged_optional_collection
  - fatal_error_message
  - force_cast
  - private_outlet
  - private_action
  - strong_iboutlet
  - unavailable_function
  - overridden_super_call
  - required_deinit
  - weak_delegate
  # SOTA additions — clarity & correctness
  - unused_import
  - unused_declaration
  - unused_capture_list
  - unused_optional_binding
  - unused_closure_parameter
  - unused_enumerated
  - unused_setter_value
  - redundant_optional_initialization
  - redundant_void_return
  - redundant_objc_attribute
  - redundant_set_access_control
  - redundant_string_enum_value
  - reduce_boolean
  - reduce_into
  - toggle_bool
  - identical_operands
  - yoda_condition
  # SOTA additions — style & consistency
  - array_init
  - attributes
  - closure_end_indentation
  - collection_alignment
  - comma_inheritance
  - conditional_returns_on_newline
  - convenience_type
  - direct_return
  - duplicate_imports
  - explicit_enum_raw_value
  - extension_access_modifier
  - flatmap_over_map_reduce
  - function_default_parameter_at_end
  - joined_default_parameter
  - last_where
  - let_var_whitespace
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - no_extension_access_modifier
  - nslocalizedstring_key
  - nslocalizedstring_require_bundle
  - number_separator
  - operator_usage_whitespace
  - optional_enum_case_matching
  - orphaned_doc_comment
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prefixed_toplevel_constant
  - private_over_fileprivate
  - prohibited_interface_builder
  - prohibited_super_call
  - redundant_discardable_let
  - required_enum_case
  - return_value_from_void_function
  - self_binding
  - shorthand_optional_binding
  - single_test_class
  - static_operator
  - strict_fileprivate
  - test_case_accessibility
  - trailing_closure
  - unneeded_break_in_switch
  - unowned_variable_capture
  - unused_control_flow_label
  - vertical_parameter_alignment
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  # SOTA — legacy & deprecation
  - legacy_random
  - legacy_cggeometry_functions
  - legacy_nsgeometry_functions
  - legacy_hashing
  - legacy_constant

excluded:
  - .derived-data
  - .spm-cache
  - .build
  - .swiftpm
  - BurnBarCore/.build
  - BurnBarCore/.swiftpm
  - BurnBarDaemon/.build
  - BurnBar.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
  - DerivedSources
  - BurnsMacOS.build
  - BurnsXcode.build
  - BurnsExtension.build
  - build
  - Pods
  - .stack-work
  - BurnsXcode
  - BurnsMacOS
  - BurnsExtension
  - AgentLensTests/Quarantine
  - AgentLensTests/Support
  - AgentLensTests/Fixtures
  - functions
  - extensions

# Per-rule overrides to prevent false positives on existing code
force_unwrapping:
  severity: warning
force_cast:
  severity: warning
missing_docs:
  severity: warning
  excludes_extensions: true
  excludes_inherited_types: true
  excludes_trivial_init: true
explicit_acl:
  severity: warning
explicit_top_level_acl:
  severity: warning
explicit_type_interface:
  severity: warning
  exclude_local_declarations: true
indentation_width:
  severity: warning
  indentation_width: 4
file_name_no_space:
  severity: warning
xct_specific_matcher:
  severity: warning
modifier_order:
  severity: warning
  preferred_modifier_order:
    - override
    - acl
    - setterACL
    - dynamic
    - mutators
    - lazy
    - final
    - required
    - convenience
    - typeMethods
    - owned

line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - on
    - to
    - by
    - at
    - if
    - or
    - as
    - in
    - no
    - is
    - of
    - my
    - ns
    - Ok
    - ok

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID
    - URL
    - HTTP
    - JSON
    - UUID

cyclomatic_complexity:
  warning: 15
  error: 25

warning_threshold: 10

reporter: xcode
