disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - redundant_nil_coalescing
  - switch_case_on_newline
  - contains_over_first_not_nil
  - empty_string
  - first_where
  - sorted_first_last
  - redundant_type_annotation
  - override_in_extension
  - multiline_parameters
  - unneeded_parentheses_in_closure_argument
  - protocol_property_accessors_order
  - sorted_imports
  - is_disjoint
  - unowned_variable_capture
  - dynamic_inline

excluded:
  - .derived-data
  - .spm-cache
  - .build
  - .swiftpm
  - BurnBarCore/.build
  - BurnBarCore/.swiftpm
  - BurnBarDaemon/.build
  - BurnBar.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
  - DerivedSources
  - BurnsMacOS.build
  - BurnsXcode.build
  - BurnsExtension.build
  - build
  - Pods
  - .stack-work
  - BurnsXcode
  - BurnsMacOS
  - BurnsExtension

line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - on
    - to
    - by
    - at
    - if
    - or
    - as
    - in
    - no
    - is
    - of
    - my
    - ns
    - Ok
    - ok

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    - ID
    - URL
    - HTTP
    - JSON
    - UUID

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 1

warning_threshold: 10

reporter: xcode
